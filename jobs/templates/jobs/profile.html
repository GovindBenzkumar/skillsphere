{% extends 'base.html' %}

{% block content %}

<div class="container mt-5">

<div class="card shadow p-4">

<h2 class="text-primary mb-4">Update Your Skills</h2>

<form method="POST" enctype="multipart/form-data">

{% csrf_token %}

<div class="mb-3">
<label>Skills</label>
{{ form.skills }}
</div>

<div class="mb-3">
<label>Upload Resume (PDF)</label>
{{ form.resume }}
</div>

<button type="submit" class="btn btn-success w-100">
Save Changes
</button>

</form>

</div>

</div>

{% endblock %}
