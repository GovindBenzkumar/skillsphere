<!DOCTYPE html>

<html>
<head>
<title>Job Portal</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">

</head>

<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
<div class="container">

<a class="navbar-brand fw-bold" href="{% url 'job_list' %}">
SkillSphere
</a>

<div>

{% if user.is_authenticated %}

{% if user.profile.role != "recruiter" %}

<a class="btn btn-outline-light me-2" href="{% url 'job_list' %}">
Jobs
</a>

<a class="btn btn-outline-light me-2" href="{% url 'my_applications' %}">
My Applications
</a>

<a class="btn btn-outline-light me-2" href="{% url 'profile' %}">
Profile
</a>

{% endif %}

<a class="btn btn-warning me-2" href="{% url 'upload_verification' %}">
Verification
</a>

<a class="btn btn-danger" href="{% url 'login' %}">
Logout
</a>

{% endif %}

</div>

</div>
</nav>

<div class="container mt-4">

{% block content %}
{% endblock %}

</div>

</body>
</html>
